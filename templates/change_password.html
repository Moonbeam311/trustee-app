<!DOCTYPE html>
<html>
<head>
  <title>Change Password</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
    input { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <p><a href="/">Back to Home</a></p>
    <h2>Change Password</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="margin: 12px 0; padding: 10px; border: 1px solid #cce5cc; background: #eef9ee; border-radius: 6px;">
          {% for message in messages %}
            <div>{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% if error_message %}
      <p class="error">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <input type="password" name="current_password" placeholder="Current Password" required>
      <input type="password" name="new_password" placeholder="New Password" required>
      <input type="password" name="confirm_password" placeholder="Confirm New Password" required>

      <button type="submit">Change Password</button>
    </form>
  </div>
</body>
</html>
