<!DOCTYPE html>
<html>
<head><title>Add Beneficiary</title></head>
<body>
<h1>Add Beneficiary</h1>

{% if error_message %}
<div style="border:1px solid red; padding:10px; margin:10px 0; color:red;">
  {{ error_message }}
</div>
{% endif %}

<p>Trust: {{ trust["trust_name"] }}</p>
<form method="POST">
  <label>Full Name</label><input type="text" name="full_name" required><br>
  <label>Tax ID</label><input type="text" name="tax_id"><br>
  <label>Beneficiary Type</label>
  <select name="beneficiary_type">
    <option value="individual">Individual</option>
    <option value="entity">Entity</option>
    <option value="charity">Charity</option>
  </select><br>
  <label>Email</label><input type="email" name="email"><br>
  <label>Address</label><textarea name="address"></textarea><br>
  <label>Allocation Method</label>
  <select name="allocation_method">
    <option value="discretionary">Discretionary</option>
    <option value="fixed_percentage">Fixed Percentage</option>
  </select><br>
  <label>Fixed Percentage</label><input type="number" step="0.01" name="fixed_percentage"><br>
  <label>Notes</label><textarea name="notes"></textarea><br>
  <button type="submit">Save Beneficiary</button>
</form>
</body>
</html>
