<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
    input { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  
{% if error_message %}
<div style="color:red; margin-bottom:10px;">
  {{ error_message }}
</div>
{% endif %}

<form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p style="margin-top: 14px; text-align: center;">
    <a href="/guide">Open User Guide</a>
  </p>
</div>

</body>
</html>
