<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
    input { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST">
    <input type="text" name="role" placeholder="Role (Admin, Trustee, Viewer)" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>
