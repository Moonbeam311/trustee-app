{% extends "base.html" %}

{% block content %}
<h2>Ledger Entry</h2>

<form method="POST">
    <label>Linked Trust</label>
    <select name="trust_id" required>
        <option value="">Select Trust</option>
        {% for trust in trusts %}
        <option value="{{ trust.trust_id }}">{{ trust.trust_id }} - {{ trust.trust_name }}</option>
        {% endfor %}
    </select>

    <label>Linked Property</label>
    <select name="property_id">
        <option value="">None</option>
        {% for prop in properties %}
        <option value="{{ prop.property_id }}">{{ prop.property_id }} - {{ prop.property_name }}</option>
        {% endfor %}
    </select>

    <label>Linked Account</label>
    <select name="account_id">
        <option value="">None</option>
        {% for account in accounts %}
        <option value="{{ account.account_id }}">{{ account.account_id }} - {{ account.account_label }}</option>
        {% endfor %}
    </select>

    <label>Entry Type</label>
    <select name="entry_type" required>
        <option value="">Select Type</option>
        <option value="receipt">Receipt</option>
        <option value="disbursement">Disbursement</option>
        <option value="fiduciary_action">Fiduciary Action</option>
        <option value="maintenance">Maintenance</option>
        <option value="tax_action">Tax Action</option>
        <option value="document_filed">Document Filed</option>
        <option value="instrument_event">Instrument Event</option>
        <option value="other">Other</option>
    </select>

    <label>Amount</label>
    <input type="number" step="0.01" name="amount">

    <label>Entry Date</label>
    <input type="date" name="entry_date" required>

    <label>Description</label>
    <input name="description" required>

    <button type="submit">Save Ledger Entry</button>
</form>
{% endblock %}
