<!DOCTYPE html>
<html>
<head>
  <title>Create User</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
    input, select { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Create User</h2>

    {% if error_message %}
      <p class="error">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>

      <select name="role_name" required>
        <option value="">Select role</option>
        <option value="Admin">Admin</option>
        <option value="Trustee">Trustee</option>
        <option value="Viewer">Viewer</option>
      </select>

      <select name="status" required>
        <option value="active">active</option>
        <option value="inactive">inactive</option>
      </select>

      <button type="submit">Create User</button>
    </form>
  </div>
</body>
</html>
