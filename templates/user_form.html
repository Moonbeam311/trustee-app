<!DOCTYPE html>
<html>
<head>
  <title>Create User</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
    input, select { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <p><a href="/users">Back to Users</a></p>
    <h2>Create User</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="margin: 12px 0; padding: 10px; border: 1px solid #cce5cc; background: #eef9ee; border-radius: 6px;">
          {% for message in messages %}
            <div>{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}


    {% if error_message %}
      <p class="error">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>

      <select name="role_name" required>
        <option value="">Select role</option>
        <option value="Admin">Admin</option>
        <option value="Trustee">Trustee</option>
        <option value="Viewer">Viewer</option>
      </select>

      <select name="status" required>
        <option value="active">active</option>
        <option value="inactive">inactive</option>
      </select>

      <button type="submit">Create User</button>
    </form>
  </div>
</body>
</html>
