<!DOCTYPE html>
<html>
<head>
  <title>Edit User</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
    input, select { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; margin-bottom: 12px; }
    .muted { color: #57606a; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Edit User</h2>
    <p class="muted">Username: <strong>{{ user.username }}</strong></p>

    {% if error_message %}
      <p class="error">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
      <select name="role_name" required>
        <option value="Admin" {% if user.role_name == "Admin" %}selected{% endif %}>Admin</option>
        <option value="Trustee" {% if user.role_name == "Trustee" %}selected{% endif %}>Trustee</option>
        <option value="Viewer" {% if user.role_name == "Viewer" %}selected{% endif %}>Viewer</option>
      </select>

      <select name="status" required>
        <option value="active" {% if user.status == "active" %}selected{% endif %}>active</option>
        <option value="inactive" {% if user.status == "inactive" %}selected{% endif %}>inactive</option>
      </select>

      <button type="submit">Save Changes</button>
    </form>
  </div>
</body>
</html>
