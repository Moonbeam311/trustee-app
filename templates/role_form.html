<!DOCTYPE html>
<html>
<head>
  <title>New Role Assignment</title>
  <style>
    body { font-family: Arial; margin: 24px; background: #f6f8fa; }
    .box { border: 1px solid #d0d7de; padding: 18px; margin-bottom: 18px; border-radius: 10px; background: #fff; }
    input, textarea, select { width: 100%; padding: 8px; margin-bottom: 12px; }
  </style>
</head>
<body>
{% include '_nav.html' %}
<h1>Add Role Assignment</h1>

<div class="box">
  <form method="POST">
    <label>Full Name</label>
    <input type="text" name="full_name">

    <label>Role Name</label>
    <select name="role_name">
      <option value="Admin">Admin</option>
      <option value="Trustee">Trustee</option>
      <option value="Viewer">Viewer</option>
    </select>

    <label>Trust</label>
    <select name="trust_id">
      {% for trust in trusts %}
      <option value="{{ trust['trust_id'] }}">{{ trust['trust_name'] }} ({{ trust['trust_id'] }})</option>
      {% endfor %}
    </select>

    <label>Status</label>
    <input type="text" name="status" value="active">

    <label>Notes</label>
    <textarea name="notes"></textarea>

    <button type="submit">Create Role</button>
  </form>
</div>

</body>
</html>
