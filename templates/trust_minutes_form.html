<!DOCTYPE html>
<html>
<head>
  <title>Create Trust Minute</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f8fa; padding:30px; color:#24292f; }
    .box { background:white; padding:20px; border-radius:8px; border:1px solid #d0d7de; margin-bottom:20px; }
    label { display:block; font-weight:bold; margin-top:12px; }
    input, select, textarea { width:100%; padding:10px; margin-top:5px; border:1px solid #d0d7de; border-radius:6px; }
    textarea { min-height:90px; }
    button, .button { display:inline-block; margin-top:16px; padding:10px 14px; border:1px solid #d0d7de; border-radius:6px; background:white; cursor:pointer; text-decoration:none; color:#24292f; }
    .muted { color:#57606a; }
  </style>
</head>
<body>

  <p><a href="{{ url_for('trust_minutes_dashboard') }}">Back to Trust Minutes</a></p>

  <div class="box">
    <h1>Create Trust Minute / Resolution</h1>
    <p class="muted">Minute ID: <strong>{{ minute_id }}</strong></p>

    <form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <label>Trust</label>
      <select name="trust_id" required>
        <option value="">Select Trust</option>
        {% for trust in trusts %}
          <option value="{{ trust.trust_id }}">{{ trust.trust_id }} — {{ trust.trust_name }}</option>
        {% endfor %}
      </select>

      <label>Meeting Date</label>
      <input type="date" name="meeting_date" required>

      <label>Meeting Type</label>
      <select name="meeting_type" required>
        <option value="Initial">Initial</option>
        <option value="Special">Special</option>
        <option value="Annual">Annual</option>
        <option value="Emergency">Emergency</option>
        <option value="Resolution Without Meeting">Resolution Without Meeting</option>
      </select>

      <label>Title</label>
      <input type="text" name="title" placeholder="Example: Initial Trust Activation Resolution" required>

      <label>Purpose</label>
      <textarea name="purpose" placeholder="State the purpose of this trustee action or meeting."></textarea>

      <label>Resolutions</label>
      <textarea name="resolutions" placeholder="Record each resolution approved or proposed."></textarea>

      <label>Action Items</label>
      <textarea name="action_items" placeholder="List follow-up duties, responsible parties, and deadlines."></textarea>

      <label>Status</label>
      <select name="status">
        <option value="Draft">Draft</option>
        <option value="Approved">Approved</option>
        <option value="Executed">Executed</option>
        <option value="Archived">Archived</option>
      </select>

      <button type="submit">Save Trust Minute</button>
    </form>
  </div>

</body>
</html>
