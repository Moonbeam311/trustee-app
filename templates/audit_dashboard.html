<!DOCTYPE html>
<html>
<head>
  <title>Audit Log</title>
  <style>
    body { font-family: Arial; margin: 24px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
  </style>
</head>
<body>
{% include '_nav.html' %}

<h1>Audit Trail</h1>

<table>
<tr>
  <th>ID</th>
  <th>Entity</th>
  <th>ID</th>
  <th>Action</th>
  <th>Note</th>
  <th>Timestamp</th>
</tr>

{% for row in logs %}
<tr>
  <td>{{ row['id'] }}</td>
  <td>{{ row['entity_type'] }}</td>
  <td>{{ row['entity_id'] }}</td>
  <td>{{ row['action'] }}</td>
  <td>{{ row['note'] }}</td>
  <td>{{ row['created_at'] }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
