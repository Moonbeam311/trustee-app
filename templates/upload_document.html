{% extends "base.html" %}

{% block content %}
<h2>Upload Document</h2>

<div style="margin-bottom:15px; padding:12px; background:#f0f4f8; border-radius:6px; border:1px solid #d9e2ec;">
    <strong>Accepted file types</strong><br>
    PDF, DOCX, DOC, TXT, JPG, JPEG, PNG
</div>

<form method="POST" enctype="multipart/form-data">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <label>Choose Existing Trust</label>
    <select name="trust_id" required>
        <option value="">Select Existing Trust</option>
        {% for trust in trusts %}
        <option value="{{ trust.trust_id }}">
            {{ trust.trust_id }} - {{ trust.trust_name }} ({{ trust.trust_type }})
        </option>
        {% endfor %}
    </select>

    <label>Linked Property (Optional)</label>
    <input name="property_id" placeholder="e.g. PR-001">

    <label>Linked Account (Optional)</label>
    <input name="account_id" placeholder="e.g. AC-001">

    <label>Document Category</label>
    <select name="document_category" required>
        <option value="">Select Category</option>
        <option value="trust_declaration">Trust Declaration</option>
        <option value="trustee_acceptance">Trustee Acceptance</option>
        <option value="property_record">Property Record</option>
        <option value="account_record">Account Record</option>
        <option value="ucc_filing">UCC Filing</option>
        <option value="tax_form">Tax Form</option>
        <option value="instrument">Instrument</option>
        <option value="minutes_resolution">Minutes / Resolution</option>
        <option value="correspondence">Correspondence</option>
        <option value="other">Other</option>
    </select>

    <label>Document Title</label>
    <input name="document_title" required>

    <label>Choose File</label>
    <input type="file" name="document_file" accept=".pdf,.docx,.doc,.txt,.jpg,.jpeg,.png" required>

    <label>Notes</label>
    <input name="notes">

    <button type="submit">Upload Document</button>
</form>
{% endblock %}
