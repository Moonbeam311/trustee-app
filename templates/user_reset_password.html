<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
    input { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; margin-bottom: 12px; }
    .muted { color: #57606a; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Reset Password</h2>
    <p class="muted">Username: <strong>{{ user.username }}</strong></p>

    {% if error_message %}
      <p class="error">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
      <input type="password" name="password" placeholder="New Password" required>
      <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
      <button type="submit">Reset Password</button>
    </form>
  </div>
</body>
</html>
