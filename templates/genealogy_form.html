<!DOCTYPE html>
<html>
<head>
  <title>New Genealogy Record</title>
  <style>
    body { font-family: Arial; margin: 24px; background: #f6f8fa; }
    .box { border: 1px solid #d0d7de; padding: 18px; margin-bottom: 18px; border-radius: 10px; background: #fff; }
    input, textarea, select { width: 100%; padding: 8px; margin-bottom: 12px; }
  </style>
</head>
<body>
{% include '_nav.html' %}

<h1>Add Genealogy / Pedigree Record</h1>

<div class="box">
  <form method="POST">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <label>Trust</label>
    <select name="trust_id">
      {% for trust in trusts %}
      <option value="{{ trust['trust_id'] }}">{{ trust['trust_name'] }} ({{ trust['trust_id'] }})</option>
      {% endfor %}
    </select>

    <label>Full Name</label>
    <input type="text" name="full_name">

    <label>Lineage Role</label>
    <input type="text" name="lineage_role">

    <label>Birth Date</label>
    <input type="date" name="birth_date">

    <label>Death Date</label>
    <input type="date" name="death_date">

    <label>Parent 1</label>
    <input type="text" name="parent_1">

    <label>Parent 2</label>
    <input type="text" name="parent_2">

    <label>Spouse</label>
    <input type="text" name="spouse">

    <label>Source Platform</label>
    <select name="source_platform">
      <option value="">Select source</option>
      <option value="Ancestry">Ancestry</option>
      <option value="FamilySearch">FamilySearch</option>
      <option value="Census">Census</option>
      <option value="Obituary">Obituary</option>
      <option value="Deed">Deed</option>
      <option value="Church/Bible Record">Church/Bible Record</option>
      <option value="Other">Other</option>
    </select>

    <label>Source Title / Record Name</label>
    <input type="text" name="source_title">

    <label>Source Reference / URL</label>
    <input type="text" name="source_reference">

    <label>Archive Date</label>
    <input type="date" name="archive_date">

    <label>Verification Status</label>
    <select name="verification_status">
      <option value="unverified">unverified</option>
      <option value="in_review">in review</option>
      <option value="partially_verified">partially verified</option>
      <option value="verified">verified</option>
    </select>

    <label>Trace Summary</label>
    <textarea name="trace_summary"></textarea>

    <label>Guidance Prompt</label>
    <textarea name="guidance_prompt" placeholder="What does this record appear to prove? What should be checked next?"></textarea>

    <label>Notes</label>
    <textarea name="notes"></textarea>

    <label>Evidence Notes</label>
    <textarea name="evidence_notes"></textarea>

    <button type="submit">Create Genealogy Record</button>
  </form>
</div>

</body>
</html>
