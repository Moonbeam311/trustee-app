{% extends "base.html" %}
{% block content %}

<h2>Add Asset</h2>

<form method="POST">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">


<label>Trust</label>
<select name="trust_id" required>
<option value="">Select Trust</option>
{% for trust in trusts %}
<option value="{{ trust.trust_id }}">
{{ trust.trust_id }} — {{ trust.trust_name }}
</option>
{% endfor %}
</select>

<label>Asset Name</label>
<input name="property_name" required>

<label>Asset Class</label>
<select name="asset_class" required>
<option value="">Select Class</option>
<option value="real_property">Real Property</option>
<option value="tangible_property">Tangible Property</option>
<option value="financial_property">Financial Property</option>
<option value="business_interest">Business Interest</option>
<option value="intellectual_property">Intellectual Property</option>
<option value="digital_property">Digital Property</option>
<option value="contractual_right">Contractual / Receivable</option>
<option value="ucc_secured_interest">UCC / Secured Interest</option>
<option value="other">Other</option>
</select>

<label>Asset Subtype</label>
<input name="asset_subtype">

<label>Identifier / Address / URL</label>
<input name="address_or_identifier">

<label>Acquisition Date</label>
<input type="date" name="acquisition_date">

<label>Established Date</label>
<input type="date" name="established_date">

<label>Effective Date</label>
<input type="date" name="effective_date">

<label>Review Date</label>
<input type="date" name="review_date">

<label>Expiration Date</label>
<input type="date" name="expiration_date">

<label>Responsible Party</label>
<input name="responsible_party">

<label>Custodian</label>
<input name="custodian">

<label>Notes</label>
<input name="title_notes">

<button type="submit">Save Asset</button>

</form>

{% endblock %}
