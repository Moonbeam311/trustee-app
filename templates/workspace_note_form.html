<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Workspace Note</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #111827; max-width: 900px; }
    label { display: block; font-weight: bold; margin-top: 12px; margin-bottom: 6px; }
    input, textarea, select { width: 100%; padding: 10px; box-sizing: border-box; }
    textarea { min-height: 120px; }
    .error { color: #991b1b; background: #fef2f2; border: 1px solid #fecaca; padding: 10px; border-radius: 8px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <p><a href="/workspaces/{{ workspace['workspace_id'] }}">Back to Workspace</a></p>
  <h1>New Workspace Note</h1>

  {% if error_message %}
    <div class="error">{{ error_message }}</div>
  {% endif %}

  <form method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <label>Note ID</label>
    <input type="text" name="note_id">

    <label>Section</label>
    <select name="section_name">
      {% for section in sections %}
        <option value="{{ section }}">{{ section }}</option>
      {% endfor %}
    </select>

    <label>Content</label>
    <textarea name="content"></textarea>

    <p><button type="submit">Save Note</button></p>
  </form>
</body>
</html>
