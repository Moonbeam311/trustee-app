<!DOCTYPE html>
<html>
<head>
  <title>Access Control / Roles</title>
  <style>
    body { font-family: Arial; margin: 24px; background: #f6f8fa; }
    .box { border: 1px solid #d0d7de; padding: 18px; margin-bottom: 18px; border-radius: 10px; background: #fff; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
  </style>
</head>
<body>
{% include '_nav.html' %}
<h1>Access Control / Role Layer</h1>

<div class="box">
  <p><a href="{{ url_for('role_new') }}">Add Role Assignment</a></p>
</div>

<div class="box">
  <table>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Role</th>
      <th>Trust</th>
      <th>Status</th>
    </tr>
    {% for r in roles %}
    <tr>
      <td>{{ r["role_id"] }}</td>
      <td>{{ r["full_name"] }}</td>
      <td>{{ r["role_name"] }}</td>
      <td>{{ r["trust_id"] }}</td>
      <td>{{ r["status"] }}</td>
    </tr>
    {% endfor %}
  </table>
</div>

</body>
</html>
