<!DOCTYPE html>
<html>
<head><title>Edit Beneficiary</title></head>
<body>
<h1>Edit Beneficiary</h1>
<p>Trust: {{ trust["trust_name"] }}</p>

<form method="POST">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

  <label>Full Name</label><input type="text" name="full_name" value="{{ beneficiary['full_name'] }}" required><br>
  <label>Tax ID</label><input type="text" name="tax_id" value="{{ beneficiary['tax_id'] or '' }}"><br>
  <label>Beneficiary Type</label>
  <select name="beneficiary_type">
    <option value="individual" {% if beneficiary["beneficiary_type"] == "individual" %}selected{% endif %}>Individual</option>
    <option value="entity" {% if beneficiary["beneficiary_type"] == "entity" %}selected{% endif %}>Entity</option>
    <option value="charity" {% if beneficiary["beneficiary_type"] == "charity" %}selected{% endif %}>Charity</option>
  </select><br>
  <label>Email</label><input type="email" name="email" value="{{ beneficiary['email'] or '' }}"><br>
  <label>Address</label><textarea name="address">{{ beneficiary['address'] or '' }}</textarea><br>
  <label>Allocation Method</label>
  <select name="allocation_method">
    <option value="discretionary" {% if beneficiary["allocation_method"] == "discretionary" %}selected{% endif %}>Discretionary</option>
    <option value="fixed_percentage" {% if beneficiary["allocation_method"] == "fixed_percentage" %}selected{% endif %}>Fixed Percentage</option>
  </select><br>
  <label>Fixed Percentage</label><input type="number" step="0.01" name="fixed_percentage" value="{{ beneficiary['fixed_percentage'] or '' }}"><br>
  <label>Notes</label><textarea name="notes">{{ beneficiary['notes'] or '' }}</textarea><br>
  <label><input type="checkbox" name="is_active" {% if beneficiary["is_active"] == "Yes" %}checked{% endif %}> Active</label><br>
  <button type="submit">Update Beneficiary</button>
</form>
</body>
</html>
