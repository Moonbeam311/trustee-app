<!DOCTYPE html>
<html>
<head><title>Record Distribution</title></head>
<body>
<h1>Record Distribution</h1>

{% if error_message %}
<div style="border:1px solid red; padding:10px; margin:10px 0; color:red;">
  {{ error_message }}
</div>
{% endif %}

<p>Trust: {{ trust["trust_name"] }}</p>
<form method="POST">
  <label>Beneficiary</label>
  <select name="beneficiary_id" required>
    <option value="">Select beneficiary</option>
    {% for b in beneficiaries %}
      <option value="{{ b['beneficiary_id'] }}">{{ b['full_name'] }}</option>
    {% endfor %}
  </select><br>
  <label>Tax Year</label><input type="number" name="tax_year" value="{{ tax_year }}" required><br>
  <label>Distribution Date</label><input type="date" name="distribution_date" required><br>
  <label>Distribution Type</label>
  <select name="distribution_type">
    <option value="cash">Cash</option>
    <option value="property">Property</option>
    <option value="expense_paid">Expense Paid</option>
  </select><br>
  <label>Description</label><textarea name="description"></textarea><br>
  <label>Gross Amount</label><input type="number" step="0.01" name="gross_amount" value="0.00" required><br>
  <label>Taxable Amount</label><input type="number" step="0.01" name="taxable_amount" value="0.00" required><br>
  <label>Principal Amount</label><input type="number" step="0.01" name="principal_amount" value="0.00" required><br>
  <label>Source Reference</label><input type="text" name="source_reference"><br>
  <button type="submit">Save Distribution</button>
</form>
</body>
</html>
