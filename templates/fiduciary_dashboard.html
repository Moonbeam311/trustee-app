<!DOCTYPE html>
<html>
<head>
  <title>Fiduciary Dashboard</title>
  <style>
    body { font-family: Arial; margin: 24px; background: #f6f8fa; }
    .box { border: 1px solid #d0d7de; padding: 18px; margin-bottom: 18px; border-radius: 10px; background: #fff; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
  </style>
</head>
<body>
{% include '_nav.html' %}

<h1>Fiduciary Role Layer</h1>

<div class="box">
  <p><a href="{{ url_for('fiduciary_new') }}">Add Fiduciary Role</a></p>
</div>

<div class="box">
  <table>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Role</th>
      <th>Authority Scope</th>
      <th>Trust</th>
      <th>Status</th>
    </tr>
    {% for f in fiduciaries %}
    <tr>
      <td>{{ f["fiduciary_id"] }}</td>
      <td>{{ f["full_name"] }}</td>
      <td>{{ f["role_title"] }}</td>
      <td>{{ f["authority_scope"] }}</td>
      <td>{{ f["trust_id"] }}</td>
      <td>{{ f["status"] }}</td>
    </tr>
    {% endfor %}
  </table>
</div>

</body>
</html>
