<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Admin Once</title>
  <style>
    body { font-family: Arial; background: #f6f8fa; padding: 40px; }
    .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
    input { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { width: 100%; padding: 10px; }
    .error { color: red; margin-bottom: 12px; }
    .note { margin-bottom: 14px; color: #444; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Bootstrap First Admin</h2>
    <p class="note">This page only works when no users exist in the system.</p>

    {% if error_message %}
      <p class="error">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <input type="text" name="username" placeholder="Admin Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>

      <button type="submit">Create First Admin</button>
    </form>
  </div>
</body>
</html>
