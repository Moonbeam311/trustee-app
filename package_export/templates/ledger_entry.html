{% extends "base.html" %}

{% block content %}
<h2>Ledger Entry</h2>

<form method="POST">
    <label>Choose Existing Trust</label>
    <select name="trust_id" required>
        <option value="">Select Existing Trust</option>
        {% for trust in trusts %}
        <option value="{{ trust.trust_id }}">
            {{ trust.trust_id }} - {{ trust.trust_name }} ({{ trust.trust_type }})
        </option>
        {% endfor %}
    </select>

    <label>Linked Property (Optional)</label>
    <input name="property_id" placeholder="e.g. PR-001">

    <label>Linked Account (Optional)</label>
    <input name="account_id" placeholder="e.g. AC-001">

    <label>Entry Type</label>
    <select name="entry_type" required>
        <option value="">Select Type</option>
        <option value="receipt">Receipt</option>
        <option value="disbursement">Disbursement</option>
        <option value="fiduciary_action">Fiduciary Action</option>
        <option value="maintenance">Maintenance</option>
        <option value="tax_action">Tax Action</option>
        <option value="document_filed">Document Filed</option>
        <option value="instrument_event">Instrument Event</option>
        <option value="other">Other</option>
    </select>

    <label>Entry Category</label>
    <select name="entry_category" required>
        <option value="">Select Category</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
        <option value="asset">Asset</option>
        <option value="liability">Liability</option>
    </select>

    <label>Accounting Method</label>
    <select name="accounting_method" required>
        <option value="">Select Method</option>
        <option value="cash">Cash</option>
        <option value="accrual">Accrual</option>
    </select>

    <label>Chart Account</label>
    <input name="chart_account" placeholder="e.g. 4000 Trust Income">

    <label>Amount</label>
    <input type="number" step="0.01" name="amount">

    <label>Entry Date</label>
    <input type="date" name="entry_date" required>

    <label>Recognition Date</label>
    <input type="date" name="recognition_date">

    <label>Due Date</label>
    <input type="date" name="due_date">

    <label>Paid Date</label>
    <input type="date" name="paid_date">

    <label>Description</label>
    <input name="description" required>

    <button type="submit">Save Ledger Entry</button>
</form>
{% endblock %}
